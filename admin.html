<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>得賢引才 - 管理中心</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        .btn-download { background: #007bff; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; cursor: pointer; border: none; }
        .btn-download:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>📁 聘工表案件管理中心</h2>
    <table>
        <thead>
            <tr>
                <th>雇主姓名</th>
                <th>被照顧人</th>
                <th>上傳日期</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="list-body">
            <tr><td colspan="4">讀取中...</td></tr>
        </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-d8MPUsZKgNIdTdOD5SZcJd2EUaU6Vvc",
        authDomain: "form-26dea.firebaseapp.com",
        projectId: "form-26dea",
        storageBucket: "form-26dea.firebasestorage.app",
        messagingSenderId: "183216722077",
        appId: "1:183216722077:web:d0ce91fd0baf749c794474",
        measurementId: "G-DDLL1CP879"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 即時讀取列表
    db.collection("cases").orderBy("uploadDate", "desc").onSnapshot(snapshot => {
        const body = document.getElementById('list-body');
        body.innerHTML = "";
        snapshot.forEach(doc => {
            const res = doc.data();
            const date = res.uploadDate ? new Date(res.uploadDate.seconds * 1000).toLocaleDateString() : "-";
            body.innerHTML += `
                <tr>
                    <td>${res.employerName}</td>
                    <td>${res.patientName}</td>
                    <td>${date}</td>
                    <td>
                        <button class="btn-download" onclick="goToDownload('${doc.id}')">下載 PDF 檔案</button>
                    </td>
                </tr>
            `;
        });
    });

    // 關鍵跳轉：帶 ID 到 index.html 下載
    function goToDownload(id) {
        window.location.href = `index.html?id=${id}`;
    }
</script>
</body>
</html>
